name: Feature request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe what you'd like HalfLife Caffeine to do.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What's the problem or unmet need? What would be better about using the app if this were added?
      placeholder: "I drink matcha every morning but there's no preset for it, and I can't add custom drinks on the watch..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? What should the UX be?
      placeholder: "Add a 'Custom' option at the end of the drink menu that opens a numeric picker for mg..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, or workarounds you've tried

  - type: dropdown
    id: scope
    attributes:
      label: Where would this live?
      multiple: true
      options:
        - Watch widget (glance or detail screens)
        - Phone companion (Garmin Connect settings)
        - Both
        - Not sure

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — screenshots, references, related features
