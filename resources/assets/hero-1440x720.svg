      </linearGradient>
      <radialGradient id="glow" cx="0.78" cy="0.5" r="0.45">
        <stop offset="0" stop-color="#3DDBA8" stop-opacity="0.18"></stop>
        <stop offset="1" stop-color="#3DDBA8" stop-opacity="0"></stop>
